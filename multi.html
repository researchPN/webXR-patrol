<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>zer0point.io - Multi Model</title>
  <meta name="description" content="View multiple 3D models in WebXR on Meta Quest">
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>
  <script>
    // FIX #1: Register component BEFORE scene parses — tick runs inside A-Frame's own loop
    AFRAME.registerComponent('grab-updater', {
      tick: function () {
        var state = window.grabState;
        if (!state || !state.grabbed || !state.grabController) return;

        var obj = state.grabController.object3D;
        var pos = new THREE.Vector3();
        var dir = new THREE.Vector3(0, 0, -1);
        var quat = new THREE.Quaternion();
        obj.getWorldPosition(pos);
        obj.getWorldQuaternion(quat);
        dir.applyQuaternion(quat);
        var point = pos.addScaledVector(dir, state.grabDistance);

        state.modelData[state.grabbed].el.setAttribute('position', {
          x: point.x, y: point.y, z: point.z
        });

        var ring = document.getElementById('selection-ring');
        ring.setAttribute('position', { x: point.x, y: point.y + 0.01, z: point.z });

        // DEBUG
        var ds = document.getElementById('debug-sphere');
        ds.setAttribute('color', 'magenta');
        ds.querySelector('a-text').setAttribute('value', 'MOVING ' + state.grabbed);
      }
    });
  </script>
  <style>
    body { margin: 0; overflow: hidden; }
    #info {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-family: sans-serif;
      font-size: 14px;
      text-align: center;
      z-index: 10;
      pointer-events: none;
    }
    #controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      font-family: sans-serif;
      font-size: 14px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }
    .model-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .model-row .label { min-width: 80px; font-weight: bold; }
    .model-row button {
      background: #444;
      color: white;
      border: none;
      border-radius: 4px;
      width: 32px;
      height: 32px;
      font-size: 18px;
      cursor: pointer;
    }
    .model-row button:hover { background: #666; }
    .height-controls button {
      width: auto;
      padding: 4px 10px;
      font-size: 12px;
    }
    #ar-button {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      background: #00aa55;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 14px 32px;
      font-size: 18px;
      font-family: sans-serif;
      font-weight: bold;
      cursor: pointer;
      z-index: 20;
      display: none;
    }
    #ar-button:hover { background: #00cc66; }
  </style>
</head>
<body>
  <div id="info">
    <strong>Quest:</strong> Point at model + hold Trigger to grab, release to drop. Thumbstick Y = scale, X = height.<br>
    <strong>Desktop:</strong> Use controls below. Click scene to move selected model.
  </div>
  <button id="ar-button">Enter AR</button>

  <div id="controls">
    <div class="model-row">
      <span class="label" style="color: #4fc3f7;">Model</span>
      <button id="scale-down-1">-</button>
      <span id="scale-label-1">1.00x</span>
      <button id="scale-up-1">+</button>
      <span class="height-controls">
        H: <button id="height-down-1">v</button>
        <button id="height-up-1">^</button>
      </span>
    </div>
    <div class="model-row">
      <span class="label" style="color: #ff8a65;">Dancing</span>
      <button id="scale-down-2">-</button>
      <span id="scale-label-2">1.00x</span>
      <button id="scale-up-2">+</button>
      <span class="height-controls">
        H: <button id="height-down-2">v</button>
        <button id="height-up-2">^</button>
      </span>
    </div>
  </div>

  <a-scene
    vr-mode-ui="enabled: true; enterAREnabled: true; enterARButton: #ar-button"
    webxr="requiredFeatures: local-floor; optionalFeatures: bounded-floor, hand-tracking; referenceSpaceType: local-floor"
    renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true"
    background="transparent: true"
    loading-screen="dotsColor: white; backgroundColor: #111"
    grab-updater
  >
    <!-- Lighting -->
    <a-entity light="type: ambient; color: #BBB; intensity: 0.6"></a-entity>
    <a-entity light="type: directional; color: #FFF; intensity: 0.8" position="1 3 2"></a-entity>
    <a-entity light="type: directional; color: #AAC; intensity: 0.4" position="-2 1 -1"></a-entity>

    <!-- Model 1: static model with invisible hitbox -->
    <a-entity
      id="model1"
      class="grabbable"
      position="-1 0 -2"
      scale="1 1 1"
    >
      <a-entity gltf-model="url(model.glb)"></a-entity>
      <a-box class="hitbox" data-model="model1" width="1" height="1.8" depth="1" position="0 0.9 0" material="opacity: 0; transparent: true" visible="true"></a-box>
    </a-entity>

    <!-- Model 2: dancing model with invisible hitbox -->
    <a-entity
      id="model2"
      class="grabbable"
      position="1 0 -2"
      scale="1 1 1"
    >
      <a-entity gltf-model="url(dancing.glb)" animation-mixer="loop: repeat"></a-entity>
      <a-box class="hitbox" data-model="model2" width="1" height="1.8" depth="1" position="0 0.9 0" material="opacity: 0; transparent: true" visible="true"></a-box>
    </a-entity>

    <!-- Selection ring — follows the grabbed/hovered model -->
    <a-ring
      id="selection-ring"
      rotation="-90 0 0"
      radius-inner="0.25"
      radius-outer="0.3"
      color="#00ff88"
      opacity="0"
      position="0 0.01 0"
    ></a-ring>

    <!-- DEBUG: floating sphere that changes color to show what's happening -->
    <a-sphere id="debug-sphere" radius="0.08" position="0 2 -1.5" color="gray">
      <a-text value="idle" align="center" position="0 0.15 0" scale="0.5 0.5 0.5" color="white"></a-text>
    </a-sphere>

    <!-- Ground plane (VR only) -->
    <a-plane rotation="-90 0 0" width="8" height="8" color="#222" opacity="0.15" position="0 0 -2" class="ar-hide"></a-plane>

    <!-- Camera -->
    <a-entity id="rig" position="0 0 0">
      <a-camera position="0 1.6 0" wasd-controls="enabled: true" look-controls="pointerLockEnabled: false"></a-camera>
    </a-entity>

    <!-- Quest controllers — raycaster targets hitboxes -->
    <a-entity id="left-hand" laser-controls="hand: left; model: false" raycaster="objects: .hitbox; far: 20; lineColor: #00ffaa; lineOpacity: 0.8">
      <a-entity oculus-touch-controls="hand: left"></a-entity>
    </a-entity>
    <a-entity id="right-hand" laser-controls="hand: right; model: false" raycaster="objects: .hitbox; far: 20; lineColor: #00ffaa; lineOpacity: 0.8">
      <a-entity oculus-touch-controls="hand: right"></a-entity>
    </a-entity>
  </a-scene>

  <script>
    // AR button — uses A-Frame's native enterAR so controllers/raycasters work
    (function () {
      const arButton = document.getElementById('ar-button');
      const scene = document.querySelector('a-scene');
      if (navigator.xr) {
        navigator.xr.isSessionSupported('immersive-ar').then(function (supported) {
          if (supported) arButton.style.display = 'block';
        });
      }
      arButton.addEventListener('click', function () {
        if (scene.enterAR) {
          scene.enterAR();
        } else {
          // Fallback for older A-Frame: patch xrSessionMode then enter VR
          scene.setAttribute('webxr', 'requiredFeatures: local-floor; optionalFeatures: bounded-floor, hand-tracking; referenceSpaceType: local-floor');
          if (scene.systems.webxr) {
            scene.systems.webxr.sessionMode = 'immersive-ar';
          }
          scene.enterVR();
        }
        arButton.style.display = 'none';
      });

      scene.addEventListener('exit-vr', function () {
        if (navigator.xr) {
          navigator.xr.isSessionSupported('immersive-ar').then(function (supported) {
            if (supported) arButton.style.display = 'block';
          });
        }
      });
    })();

    // AR/VR hide
    document.querySelector('a-scene').addEventListener('enter-vr', function () {
      if (this.is('ar-mode')) document.querySelectorAll('.ar-hide').forEach(el => el.setAttribute('visible', false));
    });
    document.querySelector('a-scene').addEventListener('exit-vr', function () {
      document.querySelectorAll('.ar-hide').forEach(el => el.setAttribute('visible', true));
    });

    // Main interaction logic
    (function () {
      const scene = document.querySelector('a-scene');
      const camera = document.querySelector('a-camera');
      const selectionRing = document.getElementById('selection-ring');

      const modelData = {
        model1: { el: document.getElementById('model1'), scale: 1, label: document.getElementById('scale-label-1') },
        model2: { el: document.getElementById('model2'), scale: 1, label: document.getElementById('scale-label-2') }
      };

      // Which model is currently selected (for desktop/thumbstick controls)
      let selected = null;
      // Which model is currently grabbed by the controller
      let grabbed = null;
      let grabController = null;
      // Distance from controller when grabbed (keeps model at same distance along ray)
      let grabDistance = 0;

      // FIX #1: Expose grab state to the grab-updater component via window
      window.grabState = { grabbed: null, grabController: null, grabDistance: 0, modelData: null };

      const SCALE_STEP = 0.1;
      const SCALE_MIN = 0.05;
      const SCALE_MAX = 50;
      const HEIGHT_STEP = 0.1;

      const raycaster = new THREE.Raycaster();
      const tempVec = new THREE.Vector3();
      const tempDir = new THREE.Vector3();
      const tempQuat = new THREE.Quaternion();

      function setSelected(id) {
        selected = id;
        if (id) {
          const pos = modelData[id].el.getAttribute('position');
          selectionRing.setAttribute('position', { x: pos.x, y: pos.y + 0.01, z: pos.z });
          selectionRing.setAttribute('opacity', 0.6);
          selectionRing.setAttribute('color', id === 'model1' ? '#4fc3f7' : '#ff8a65');
        } else {
          selectionRing.setAttribute('opacity', 0);
        }
      }

      function setScale(id, s) {
        const m = modelData[id];
        m.scale = Math.max(SCALE_MIN, Math.min(SCALE_MAX, s));
        m.el.setAttribute('scale', { x: m.scale, y: m.scale, z: m.scale });
        m.label.textContent = m.scale.toFixed(2) + 'x';
      }

      function adjustHeight(id, delta) {
        const el = modelData[id].el;
        const pos = el.getAttribute('position');
        el.setAttribute('position', { x: pos.x, y: Math.max(0, pos.y + delta), z: pos.z });
        if (id === selected) setSelected(id);
      }

      // Track which model the controller ray is currently hovering over
      let hoveredModel = null;
      let lastHoveredModel = null;  // FIX #2: remembers last hovered even if ray drifts off

      // DEBUG helper — floating sphere shows state
      const debugSphere = document.getElementById('debug-sphere');
      const debugText = debugSphere.querySelector('a-text');
      function debugState(color, label) {
        debugSphere.setAttribute('color', color);
        debugText.setAttribute('value', label);
      }

      // Get point along controller ray at given distance
      function getPointOnRay(controllerObj3D, distance) {
        controllerObj3D.getWorldPosition(tempVec);
        tempDir.set(0, 0, -1).applyQuaternion(controllerObj3D.getWorldQuaternion(tempQuat));
        return tempVec.clone().addScaledVector(tempDir, distance);
      }

      // --- Quest controller: point-and-grab via A-Frame raycaster ---
      scene.addEventListener('loaded', function () {
        ['left-hand', 'right-hand'].forEach(handId => {
          const hand = document.getElementById(handId);
          // The oculus-touch-controls child fires button events
          const controllerChild = hand.querySelector('[oculus-touch-controls]');

          // Raycaster hover events — fired by A-Frame when ray intersects .hitbox
          hand.addEventListener('raycaster-intersection', function (evt) {
            const hitEl = evt.detail.els[0];
            if (hitEl && hitEl.classList.contains('hitbox')) {
              const modelId = hitEl.dataset.model;
              hoveredModel = modelId;
              lastHoveredModel = modelId;  // FIX #2: remember it
              setSelected(modelId);
              debugState('yellow', 'HOVER: ' + modelId);
            }
          });

          hand.addEventListener('raycaster-intersection-cleared', function () {
            if (!grabbed) {
              hoveredModel = null;
              // Don't clear lastHoveredModel — keep it for grab fallback
              debugState('gray', 'idle');
            }
          });

          // Grip/trigger down = grab the hovered model (or last hovered)
          function onGrab() {
            const target = hoveredModel || lastHoveredModel;  // FIX #2: fallback to last hovered
            debugState('orange', 'BTN hov=' + (hoveredModel || 'null') + ' last=' + (lastHoveredModel || 'null'));
            if (target) {
              grabbed = target;
              grabController = hand;
              const modelPos = new THREE.Vector3();
              modelData[grabbed].el.object3D.getWorldPosition(modelPos);
              hand.object3D.getWorldPosition(tempVec);
              grabDistance = tempVec.distanceTo(modelPos);
              setSelected(grabbed);
              // FIX #1: sync to global state for grab-updater component
              window.grabState.grabbed = grabbed;
              window.grabState.grabController = grabController;
              window.grabState.grabDistance = grabDistance;
              window.grabState.modelData = modelData;
              debugState('red', 'GRAB: ' + grabbed + ' d=' + grabDistance.toFixed(1));
            }
          }

          // Grip up = release/drop
          function onRelease() {
            debugState('cyan', 'BTN released');
            if (grabbed && grabController === hand) {
              grabbed = null;
              grabController = null;
              // FIX #1: sync to global state
              window.grabState.grabbed = null;
              window.grabState.grabController = null;
              debugState('green', 'DROPPED');
            }
          }

          // Listen on both the hand and the child for maximum compatibility
          hand.addEventListener('gripdown', onGrab);
          hand.addEventListener('gripup', onRelease);
          hand.addEventListener('triggerdown', onGrab);
          hand.addEventListener('triggerup', onRelease);
          if (controllerChild) {
            controllerChild.addEventListener('gripdown', onGrab);
            controllerChild.addEventListener('gripup', onRelease);
            controllerChild.addEventListener('triggerdown', onGrab);
            controllerChild.addEventListener('triggerup', onRelease);
          }
        });

        // Thumbstick: Y = scale selected, X = height selected
        const thumbstickThreshold = 0.5;
        let cooldown = false;
        ['left-hand', 'right-hand'].forEach(handId => {
          document.getElementById(handId).addEventListener('thumbstickmoved', function (evt) {
            if (!selected || cooldown) return;
            const { x, y } = evt.detail;
            if (y < -thumbstickThreshold) {
              setScale(selected, modelData[selected].scale * 1.15);
              cooldown = true; setTimeout(() => { cooldown = false; }, 200);
            } else if (y > thumbstickThreshold) {
              setScale(selected, modelData[selected].scale / 1.15);
              cooldown = true; setTimeout(() => { cooldown = false; }, 200);
            } else if (x > thumbstickThreshold) {
              adjustHeight(selected, HEIGHT_STEP);
              cooldown = true; setTimeout(() => { cooldown = false; }, 200);
            } else if (x < -thumbstickThreshold) {
              adjustHeight(selected, -HEIGHT_STEP);
              cooldown = true; setTimeout(() => { cooldown = false; }, 200);
            }
          });
        });

        // FIX #1: removed setAnimationLoop — grab-updater component handles per-frame updates
      });

      // --- Desktop controls ---
      // Scale buttons
      document.getElementById('scale-up-1').addEventListener('click', e => { e.stopPropagation(); setScale('model1', modelData.model1.scale + SCALE_STEP); });
      document.getElementById('scale-down-1').addEventListener('click', e => { e.stopPropagation(); setScale('model1', modelData.model1.scale - SCALE_STEP); });
      document.getElementById('scale-up-2').addEventListener('click', e => { e.stopPropagation(); setScale('model2', modelData.model2.scale + SCALE_STEP); });
      document.getElementById('scale-down-2').addEventListener('click', e => { e.stopPropagation(); setScale('model2', modelData.model2.scale - SCALE_STEP); });

      // Height buttons
      document.getElementById('height-up-1').addEventListener('click', e => { e.stopPropagation(); adjustHeight('model1', HEIGHT_STEP); });
      document.getElementById('height-down-1').addEventListener('click', e => { e.stopPropagation(); adjustHeight('model1', -HEIGHT_STEP); });
      document.getElementById('height-up-2').addEventListener('click', e => { e.stopPropagation(); adjustHeight('model2', HEIGHT_STEP); });
      document.getElementById('height-down-2').addEventListener('click', e => { e.stopPropagation(); adjustHeight('model2', -HEIGHT_STEP); });

      // Keyboard
      window.addEventListener('keydown', function (evt) {
        if (evt.key === '1') setSelected('model1');
        if (evt.key === '2') setSelected('model2');
        if (!selected) return;
        if (evt.key === '+' || evt.key === '=') setScale(selected, modelData[selected].scale + SCALE_STEP);
        if (evt.key === '-' || evt.key === '_') setScale(selected, modelData[selected].scale - SCALE_STEP);
        if (evt.key === '[') adjustHeight(selected, -HEIGHT_STEP);
        if (evt.key === ']') adjustHeight(selected, HEIGHT_STEP);
      });

      // Desktop: click model to grab, drag to move, release to drop
      const floorPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
      const floorIntersection = new THREE.Vector3();
      let desktopGrabbed = null;

      function getMouseRay(evt) {
        const rect = scene.canvas.getBoundingClientRect();
        const mouse = new THREE.Vector2(
          ((evt.clientX - rect.left) / rect.width) * 2 - 1,
          -((evt.clientY - rect.top) / rect.height) * 2 + 1
        );
        const cam = camera.getObject3D('camera');
        raycaster.setFromCamera(mouse, cam);
      }

      function hitTestModelsDesktop(evt) {
        getMouseRay(evt);
        let closest = null;
        let closestDist = Infinity;
        for (const [id, data] of Object.entries(modelData)) {
          const hits = raycaster.intersectObject(data.el.object3D, true);
          if (hits.length > 0 && hits[0].distance < closestDist) {
            closestDist = hits[0].distance;
            closest = id;
          }
        }
        return closest;
      }

      scene.canvas.addEventListener('mousedown', function (evt) {
        if (scene.is('vr-mode')) return;
        const hit = hitTestModelsDesktop(evt);
        if (hit) {
          desktopGrabbed = hit;
          setSelected(hit);
          // Disable look-controls while dragging so camera doesn't spin
          camera.setAttribute('look-controls', 'enabled', false);
        }
      });

      window.addEventListener('mousemove', function (evt) {
        if (!desktopGrabbed || scene.is('vr-mode')) return;
        getMouseRay(evt);
        // Move along a plane at the model's current Y height
        const el = modelData[desktopGrabbed].el;
        const currentY = el.getAttribute('position').y;
        const dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -currentY);
        if (raycaster.ray.intersectPlane(dragPlane, floorIntersection)) {
          el.setAttribute('position', { x: floorIntersection.x, y: currentY, z: floorIntersection.z });
          setSelected(desktopGrabbed);
        }
      });

      window.addEventListener('mouseup', function () {
        if (desktopGrabbed) {
          desktopGrabbed = null;
          // Re-enable look-controls
          camera.setAttribute('look-controls', 'enabled', true);
        }
      });
    })();
  </script>
</body>
</html>
